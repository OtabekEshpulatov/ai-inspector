<!DOCTYPE html>
<html>
<head>
    <title>Relationship Intelligence Model</title>
    <script type="text/javascript" src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Inter', sans-serif; background: #0f172a; color: #fff; overflow: hidden; }
        #mynetwork { width: 100%; height: 100vh; }
        
        .header { position: absolute; top: 20px; left: 20px; z-index: 10; background: rgba(30, 41, 59, 0.7); padding: 20px 30px; border-radius: 16px; backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 8px 0; font-size: 22px; font-weight: 600; background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { margin: 0 0 15px 0; font-size: 14px; color: #94a3b8; }
        
        .upload-panel { display: flex; gap: 10px; align-items: center; }
        .btn-primary { background: #38bdf8; color: #0f172a; border: none; padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
        .btn-primary:hover { background: #7dd3fc; transform: translateY(-1px); }
        .btn-secondary { background: rgba(255,255,255,0.05); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 16px; border-radius: 8px; cursor: pointer; }
        .btn-secondary:hover { background: rgba(255,255,255,0.1); }

        #edge-info, #node-info { position: absolute; z-index: 10; background: rgba(15, 23, 42, 0.9); padding: 20px; border-radius: 16px; backdrop-filter: blur(15px); border: 1px solid rgba(56, 189, 248, 0.3); display: none; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        #node-info { top: 20px; right: 20px; min-width: 250px; }
        #edge-info { bottom: 20px; right: 20px; min-width: 250px; }
        
        .severity-high { color: #f43f5e; font-weight: 600; }
        .severity-low { color: #10b981; }
    </style>
</head>
<body>
    <div class="header">
        <h2>Risk Intelligence</h2>
        <p>Analyzing Destination-based interactions.</p>
        <div class="upload-panel">
            <input type="file" id="fileInput" accept=".xlsx" style="display: none;">
            <button onclick="document.getElementById('fileInput').click()" class="btn-secondary">Choose XLSX</button>
            <button onclick="uploadFile()" class="btn-primary">Ingest</button>
        </div>
    </div>
    
    <div id="node-info"></div>
    <div id="edge-info"></div>
    <div id="mynetwork"></div>

    <script type="text/javascript">
        let network = null;
        let graphData = { nodes: new vis.DataSet([]), edges: new vis.DataSet([]) };

        function loadGraph() {
            fetch('/graph')
                .then(res => res.json())
                .then(data => {
                    const colors = ["#38bdf8", "#818cf8", "#fbbf24", "#f472b6", "#a78bfa", "#4ade80"];
                    
                    const nodes = data.nodes.map(n => ({
                        id: n.id,
                        label: n.label,
                        title: n.type === 'Employee' ? `Group: ${n.group}` : n.full_name,
                        type: n.type,
                        group: n.group,
                        cluster_id: n.cluster_id,
                        color: n.type === 'Employee' ? colors[n.cluster_id % colors.length] : '#94a3b8',
                        shape: n.type === 'Employee' ? 'dot' : 'diamond',
                        size: n.type === 'Employee' ? 20 : 12,
                        font: { color: '#f1f5f9', size: 12, face: 'Inter' }
                    }));

                    const edges = data.edges.map(e => ({
                        from: e.from,
                        to: e.to,
                        value: e.value,
                        channel: e.channel,
                        severity: e.severity,
                        action: e.action,
                        color: { 
                            color: e.action === 'Blocked' ? '#f43f5e' : 'rgba(148, 163, 184, 0.3)',
                            highlight: '#38bdf8'
                        },
                        width: Math.sqrt(e.value) * 2
                    }));

                    graphData.nodes.clear();
                    graphData.edges.clear();
                    graphData.nodes.add(nodes);
                    graphData.edges.add(edges);

                    if (!network) {
                        const container = document.getElementById('mynetwork');
                        const options = {
                            physics: {
                                forceAtlas2Based: { gravitationalConstant: -100, centralGravity: 0.01, springLength: 150, springConstant: 0.05 },
                                solver: 'forceAtlas2Based',
                                stabilization: { iterations: 100 }
                            },
                            interaction: { hover: true, tooltipDelay: 200 }
                        };
                        network = new vis.Network(container, graphData, options);
                        setupEvents();
                    }
                });
        }

        function setupEvents() {
            network.on("selectNode", function (params) {
                if (params.nodes.length > 0) {
                    const node = graphData.nodes.get(params.nodes[0]);
                    const infoDiv = document.getElementById('node-info');
                    infoDiv.style.display = 'block';
                    
                    if (node.type === 'Employee') {
                        infoDiv.innerHTML = `<h3>Employee: ${node.id}</h3>` +
                                          `<p><strong>Group:</strong> ${node.group}</p>` +
                                          `<p><strong>Cluster:</strong> ${node.cluster_id}</p>`;
                    } else {
                        infoDiv.innerHTML = `<h3>Destination</h3>` +
                                          `<p style="word-break: break-all;">${node.id}</p>`;
                    }
                }
            });

            network.on("selectEdge", function (params) {
                if (params.edges.length > 0) {
                    const edge = graphData.edges.get(params.edges[0]);
                    const infoDiv = document.getElementById('edge-info');
                    infoDiv.style.display = 'block';
                    infoDiv.innerHTML = `<h3>Relationship</h3>` +
                                      `<p><strong>Channel:</strong> ${edge.channel}</p>` +
                                      `<p><strong>Severity:</strong> <span class="severity-${edge.severity.toLowerCase()}">${edge.severity}</span></p>` +
                                      `<p><strong>Action:</strong> ${edge.action}</p>` +
                                      `<p><strong>Risk Score:</strong> ${edge.value}</p>`;
                }
            });

            network.on("deselectNode", () => document.getElementById('node-info').style.display = 'none');
            network.on("deselectEdge", () => document.getElementById('edge-info').style.display = 'none');
        }

        async function uploadFile() {
            const input = document.getElementById('fileInput');
            if (!input.files[0]) return alert("Select a file first!");

            const formData = new FormData();
            formData.append('file', input.files[0]);

            const btn = document.querySelector('.btn-primary');
            btn.innerText = "Processing...";
            btn.disabled = true;

            try {
                const res = await fetch('/ingest', { method: 'POST', body: formData });
                const result = await res.json();
                if (result.status === 'success') {
                    alert(`Successfully ingested ${result.processed} records!`);
                    loadGraph();
                } else {
                    alert("Error: " + result.message);
                }
            } catch (e) {
                alert("Upload failed: " + e.message);
            } finally {
                btn.innerText = "Ingest";
                btn.disabled = false;
            }
        }

        loadGraph();
    </script>
</body>
</html>
