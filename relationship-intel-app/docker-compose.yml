services:
  neo4j:
    image: neo4j:5.18
    ports:
      - "7474:7474"   # HTTP
      - "7687:7687"   # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=password
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - neo4j
      - redis
    volumes:
      - .:/app
      # Mount the event generation directory so the UI can read employee names
      - ../event-data-generator:/event-data-generator

volumes:
  neo4j_data:
